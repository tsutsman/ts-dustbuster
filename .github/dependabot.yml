version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    reviewers:
      - 'tsutsman'
    assignees:
      - 'tsutsman'
    labels:
      - 'dependencies'
      - 'security'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    security-updates: true
    allow:
      - dependency-type: 'direct'
      - dependency-type: 'indirect'
